name: Deploy to GitHub Pages

# Publishes the self-contained index.html to GitHub Pages via GitHub Actions
# (the bracket's legacy branch builder was flaky). Runs on pushes to main and
# on explicit dispatch.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # Stage only the site files — no .git, workflows, editor config or docs.
      - name: Stage static site
        run: |
          mkdir -p _site
          rsync -a \
            --exclude='.git' --exclude='.github' --exclude='.claude' \
            --exclude='_site' --exclude='*.md' \
            ./ _site/

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
